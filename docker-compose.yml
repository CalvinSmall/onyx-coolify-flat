# ============================================================================
# ONYX LITE - COOLIFY DEPLOYMENT
# ============================================================================
# Minimal Onyx deployment for Coolify (Docker Compose buildpack)
# - No vector database (DISABLE_VECTOR_DB=true)
# - No Redis (uses PostgreSQL for cache)
# - No model servers (bring your own LLM API)
# - No background workers (API handles all work)
# - No OpenSearch (no RAG indexing)
# - No MinIO (uses PostgreSQL for file storage)
#
# Core features that STILL WORK:
# - LLM chat conversations
# - Tool integrations
# - User file uploads
# - Projects
# - Agent knowledge
# - Code interpreter
#
# Deploy in Coolify:
# 1. Create new Application from Git repository
# 2. Set Build Pack to "Docker Compose"
# 3. Point to this docker-compose.yml
# 4. Add environment variables from Coolify UI
# 5. Configure storage volumes in Coolify UI
# ============================================================================

name: onyx

services:
  api_server:
    image: onyxdotapp/onyx-backend:${IMAGE_TAG:-latest}
    command: >
      /bin/sh -c "alembic upgrade head &&
      echo 'Starting Onyx Api Server' &&
      uvicorn onyx.main:app --host 0.0.0.0 --port 8080"
    restart: unless-stopped
    depends_on:
      relational_db:
        condition: service_healthy
    environment:
      - AUTH_TYPE=${AUTH_TYPE}
      - USER_AUTH_SECRET=${USER_AUTH_SECRET}
      - WEB_DOMAIN=${WEB_DOMAIN}
      - INTERNAL_URL=http://api_server:8080
      - DISABLE_VECTOR_DB=true
      - FILE_STORE_BACKEND=postgres
      - CACHE_BACKEND=postgres
      - AUTH_BACKEND=postgres
      - POSTGRES_HOST=relational_db
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DISABLE_MODEL_SERVER=true
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ENCRYPTION_KEY_SECRET=${ENCRYPTION_KEY_SECRET}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 600s
    volumes:
      - api_server_logs:/var/log/onyx
      - file-system:/app/file-system
    networks:
      - onyx-network

  web_server:
    image: onyxdotapp/onyx-web-server:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - api_server
    environment:
      - INTERNAL_URL=http://api_server:8080
      - WEB_DOMAIN=${WEB_DOMAIN}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - onyx-network

  nginx:
    image: nginx:1.25.5-alpine
    restart: unless-stopped
    depends_on:
      api_server:
        condition: service_healthy
      web_server:
        condition: service_healthy
    ports:
      - "${HOST_PORT:-3000}:80"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - NGINX_PROXY_CONNECT_TIMEOUT=${NGINX_PROXY_CONNECT_TIMEOUT:-300}
      - NGINX_PROXY_SEND_TIMEOUT=${NGINX_PROXY_SEND_TIMEOUT:-300}
      - NGINX_PROXY_READ_TIMEOUT=${NGINX_PROXY_READ_TIMEOUT:-300}
    volumes:
      - ./nginx-templates:/nginx-templates:ro
    command: >
      /bin/sh -c "rm -f /etc/nginx/conf.d/default.conf
      && cp -a /nginx-templates/. /etc/nginx/conf.d/
      && sed 's/\r$//' /etc/nginx/conf.d/run-nginx.sh > /tmp/run-nginx.sh
      && chmod +x /tmp/run-nginx.sh
      && /tmp/run-nginx.sh app.conf.template"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - onyx-network

  relational_db:
    image: postgres:15.2-alpine
    shm_size: 1g
    command: -c 'max_connections=250'
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=onyx
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - onyx-network

networks:
  onyx-network:
    driver: bridge

volumes:
  db_data:
    driver: local
  api_server_logs:
    driver: local
  file-system:
    driver: local