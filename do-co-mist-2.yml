version: '3.8'

# ============================================
# ONYX LITE + CRAFT + MISTRAL + BASIC AUTH
# Fixed: Consistent YAML formatting for Coolify
# ============================================

networks:
  onyx-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  file_connector_storage:
  craft_sandbox_artifacts:

services:
  web_server:
    image: onyx-dot-app/onyx-web:latest
    container_name: onyx-web
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      INTERNAL_URL: http://api_server:8080
      DOMAIN: ${DOMAIN}
      WEB_DOMAIN: ${WEB_DOMAIN}
      ENABLE_CRAFT: ${ENABLE_CRAFT:-true}
      NEXT_TELEMETRY_DISABLED: "1"
    networks:
      - onyx-network
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  api_server:
    image: onyx-dot-app/onyx-backend:latest
    container_name: onyx-api
    restart: unless-stopped
    expose:
      - "8080"
    # FIX: Use consistent map format for all env vars
    environment:
      # Domain
      DOMAIN: ${DOMAIN}
      WEB_DOMAIN: ${WEB_DOMAIN}
      
      # Auth (Basic Auth mode)
      AUTH_TYPE: ${AUTH_TYPE:-basic}
      REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-false}
      
      # Security
      SECRET: ${SECRET}
      
      # Lite Mode (No Vespa)
      ENABLE_LITE: "true"
      USE_VESPA: "false"
      DOCUMENT_ENCODER: hybrid
      
      # Database
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-onyx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: onyx
      POSTGRES_PORT: "5432"
      
      # Redis
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_PORT: "6379"
      
      # Privacy
      ENABLE_TELEMETRY: "false"
      METRICS_DRIVER: none
      
      # Mistral AI - Main LLM
      GENAI_MODEL_PROVIDER: mistral
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      MISTRAL_MODEL: ${MISTRAL_MODEL:-mistral-small-latest}
      MISTRAL_ENDPOINT: ${MISTRAL_ENDPOINT:-}
      
      # Mistral - Embeddings (1024 dimensions)
      EMBEDDING_PROVIDER: mistral
      EMBEDDING_MODEL: mistral-embed
      MISTRAL_EMBEDDING_API_KEY: ${MISTRAL_EMBEDDING_API_KEY:-${MISTRAL_API_KEY}}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-50}
      
      # Craft Integration
      ENABLE_CRAFT: ${ENABLE_CRAFT:-true}
      CRAFT_SERVICE_URL: http://craft-service:8081
      
      # File Handling
      FILE_CONNECTOR_TMP_STORAGE_PATH: /tmp/file_storage
      FILE_CONNECTOR_S3_BUCKET: ${FILE_CONNECTOR_S3_BUCKET:-}
      
      # Logging & Security
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_MAX_BYTES: "10485760"
      LOG_BACKUP_COUNT: "5"
      DISABLE_LLM_QUERY_FILTER: ${DISABLE_LLM_QUERY_FILTER:-false}
      MAX_FILE_SIZE_BYTES: "52428800"
      
    volumes:
      - file_connector_storage:/tmp/file_storage:rw
      - craft_sandbox_artifacts:/tmp/craft_artifacts:rw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      craft-service:
        condition: service_started
    networks:
      - onyx-network
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  background:
    image: onyx-dot-app/onyx-backend:latest
    container_name: onyx-background
    restart: unless-stopped
    # FIX: Use literal block scalar | instead of folded > for complex commands
    command: |
      sh -c "
        echo 'Running database migrations...' &&
        alembic upgrade head &&
        echo 'Starting Celery workers...' &&
        celery -A onyx.background.celery worker -Q celery,default,celery:4,cleanup --loglevel=INFO --concurrency=4 -n background@%h
      "
    environment:
      DOMAIN: ${DOMAIN}
      WEB_DOMAIN: ${WEB_DOMAIN}
      ENABLE_LITE: "true"
      USE_VESPA: "false"
      AUTH_TYPE: ${AUTH_TYPE:-basic}
      SECRET: ${SECRET}
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-onyx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: onyx
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      GENAI_MODEL_PROVIDER: mistral
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      MISTRAL_MODEL: ${MISTRAL_MODEL:-mistral-small-latest}
      MISTRAL_ENDPOINT: ${MISTRAL_ENDPOINT:-}
      EMBEDDING_PROVIDER: mistral
      EMBEDDING_MODEL: mistral-embed
      MISTRAL_EMBEDDING_API_KEY: ${MISTRAL_EMBEDDING_API_KEY:-${MISTRAL_API_KEY}}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-50}
      ENABLE_CRAFT: ${ENABLE_CRAFT:-true}
      CRAFT_SERVICE_URL: http://craft-service:8081
      FILE_CONNECTOR_TMP_STORAGE_PATH: /tmp/file_storage
      ENABLE_TELEMETRY: "false"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - file_connector_storage:/tmp/file_storage:rw
      - craft_sandbox_artifacts:/tmp/craft_artifacts:rw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      craft-service:
        condition: service_started
    networks:
      - onyx-network
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  craft-service:
    image: onyx-dot-app/onyx-craft:latest
    container_name: onyx-craft
    restart: unless-stopped
    expose:
      - "8081"
    environment:
      PORT: "8081"
      SANDBOX_TIMEOUT: ${CRAFT_TIMEOUT:-120}
      MAX_MEMORY_MB: ${CRAFT_MAX_MEMORY:-512}
      MAX_OUTPUT_LENGTH: "10000"
      WHITELISTED_MODULES: numpy,pandas,matplotlib,requests,beautifulsoup4,scipy,scikit-learn
      DISABLE_NETWORKING: ${CRAFT_DISABLE_NETWORK:-false}
      ALLOWED_HOSTS: ${DOMAIN},api.mistral.ai,*.mistral.ai
      LOG_LEVEL: INFO
    volumes:
      - craft_sandbox_artifacts:/tmp/craft_artifacts:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - onyx-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  postgres:
    image: pgvector/pgvector:pg15
    container_name: onyx-postgres
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-onyx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: onyx
      POSTGRES_SHARED_PRELOAD_LIBRARIES: pg_stat_statements,pgvector
      POSTGRES_MAX_CONNECTIONS: "200"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Create this file locally: init-db/01-init.sql
      - ./init-db/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - onyx-network
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: onyx-redis
    restart: unless-stopped
    # FIX: Command structure for Redis
    command: > 
      redis-server 
      --requirepass ${REDIS_PASSWORD} 
      --maxmemory 512mb 
      --maxmemory-policy allkeys-lru 
      --appendonly yes 
      --appendfsync everysec
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - onyx-network
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
