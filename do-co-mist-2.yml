version: '3.8'

# ============================================
# ONYX LITE + CRAFT + MISTRAL + BASIC AUTH
# Coolify-native: Uses Coolify's built-in reverse proxy
# No nginx container needed
# ============================================

networks:
  onyx-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  local_dynamic_storage:
    driver: local
  file_connector_tmp_storage:
    driver: local
  craft_sandbox_artifacts:
    driver: local

services:
  # ==========================================
  # WEB FRONTEND (Next.js) - BUILT LOCALLY
  # Coolify will route HTTP/HTTPS to port 3000
  # ==========================================
  web_server:
    build:
      context: ../../web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_DISABLE_STREAMING=false
        - NEXT_PUBLIC_NEW_CHAT_DIRECTS_TO_SAME_PERSONA=false
    image: onyx-dot-app/onyx-web:${IMAGE_TAG:-latest}
    container_name: onyx-web
    restart: unless-stopped
    # Coolify routes to this port via its proxy (Caddy/Traefik)
    expose:
      - "3000"
    environment:
      # Domain configuration
      DOMAIN: ${DOMAIN:-localhost}
      WEB_DOMAIN: ${WEB_DOMAIN:-http://localhost:3000}
      HEADER_DOMAIN: ${DOMAIN:-localhost}
      
      # API backend connection (internal, not exposed)
      INTERNAL_URL: http://api_server:8080
      
      # File upload limits
      NEXT_PUBLIC_MAX_FILE_SIZE: 50000000
      NEXT_PUBLIC_MAX_DOCUMENT_SIZE: 50000000
      
      # Privacy & telemetry
      NEXT_TELEMETRY_DISABLED: "1"
      
      # Feature flags
      ENABLE_CRAFT: "true"
      
    depends_on:
      - api_server
    networks:
      onyx-network:
        ipv4_address: 172.28.0.10
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================
  # API SERVER (Python/FastAPI) - BUILT LOCALLY
  # Not exposed directly; accessed via web_server internally
  # ==========================================
  api_server:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    image: onyx-dot-app/onyx-backend:${IMAGE_TAG:-latest}
    container_name: onyx-api
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      # ========================================
      # AUTHENTICATION
      # ========================================
      AUTH_TYPE: ${AUTH_TYPE:-basic}
      REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-false}
      SECRET: ${SECRET}
      
      # ========================================
      # DOMAIN CONFIGURATION
      # ========================================
      DOMAIN: ${DOMAIN:-localhost}
      WEB_DOMAIN: ${WEB_DOMAIN:-http://localhost:3000}
      
      # ========================================
      # LITE MODE (No Vespa)
      # ========================================
      ENABLE_LITE: "true"
      USE_VESPA: "false"
      DISABLE_INDEXING: "false"
      
      # ========================================
      # POSTGRESQL (application data)
      # ========================================
      POSTGRES_HOST: relational_db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: postgres
      
      # ========================================
      # VECTOR DATABASE (pgvector - Lite mode)
      # ========================================
      VESPA_HOST: ""
      VESPA_PORT: ""
      
      # ========================================
      # REDIS
      # ========================================
      REDIS_HOST: cache
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      
      # ========================================
      # MISTRAL AI - LLM
      # ========================================
      GENAI_MODEL_PROVIDER: mistral
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      MISTRAL_MODEL: ${MISTRAL_MODEL:-mistral-small-latest}
      MISTRAL_ENDPOINT: ${MISTRAL_ENDPOINT:-}
      
      # ========================================
      # MISTRAL AI - EMBEDDINGS (1024d)
      # ========================================
      EMBEDDING_PROVIDER: mistral
      EMBEDDING_MODEL: mistral-embed
      MISTRAL_EMBEDDING_API_KEY: ${MISTRAL_EMBEDDING_API_KEY:-${MISTRAL_API_KEY}}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-50}
      
      # ========================================
      # FILE STORAGE
      # ========================================
      FILE_CONNECTOR_TMP_STORAGE_PATH: /home/file_connector_attachments
      STALE_FILE_CLEANUP_DAYS: "7"
      
      # ========================================
      # CRAFT INTEGRATION
      # ========================================
      ENABLE_CRAFT: "true"
      CRAFT_SERVICE_URL: http://craft-service:8081
      DOCKER_HOST: unix:///var/run/docker.sock
      
      # ========================================
      # PRIVACY & TELEMETRY
      # ========================================
      ENABLE_TELEMETRY: "false"
      DISABLE_FEEDBACK: "true"
      METRICS_DRIVER: none
      
      # ========================================
      # LOGGING
      # ========================================
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_MAX_BYTES: "10485760"
      LOG_BACKUP_COUNT: "5"
      
      # ========================================
      # PERFORMANCE
      # ========================================
      DISABLE_LLM_CHOOSE_SEARCH: "false"
      INDEXING_INFO_CACHE_CAPACITY: "10000"
      
    volumes:
      - local_dynamic_storage:/home/storage
      - file_connector_tmp_storage:/home/file_connector_attachments
      - craft_sandbox_artifacts:/tmp/craft_artifacts
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      relational_db:
        condition: service_healthy
      cache:
        condition: service_healthy
      vector:
        condition: service_healthy
      craft-service:
        condition: service_started
    networks:
      onyx-network:
        ipv4_address: 172.28.0.20
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==========================================
  # BACKGROUND WORKER (Celery)
  # Reuses locally built onyx-backend image
  # No ports exposed - internal only
  # ==========================================
  background:
    image: onyx-dot-app/onyx-backend:${IMAGE_TAG:-latest}
    container_name: onyx-background
    restart: unless-stopped
    command: >
      /bin/sh -c "
        echo 'Running database migrations...' &&
        alembic upgrade head &&
        echo 'Starting Celery workers...' &&
        celery -A onyx.background.celery worker
        --pool=threads
        --concurrency=6
        --loglevel=INFO
        -Q celery,celery:2,celery:3,check_for_signals
        -n background@%h
      "
    environment:
      # Authentication
      AUTH_TYPE: ${AUTH_TYPE:-basic}
      REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-false}
      SECRET: ${SECRET}
      
      # Domain
      DOMAIN: ${DOMAIN:-localhost}
      WEB_DOMAIN: ${WEB_DOMAIN:-http://localhost:3000}
      
      # Lite mode
      ENABLE_LITE: "true"
      USE_VESPA: "false"
      
      # PostgreSQL
      POSTGRES_HOST: relational_db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: postgres
      
      # Redis
      REDIS_HOST: cache
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      
      # Mistral LLM
      GENAI_MODEL_PROVIDER: mistral
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      MISTRAL_MODEL: ${MISTRAL_MODEL:-mistral-small-latest}
      MISTRAL_ENDPOINT: ${MISTRAL_ENDPOINT:-}
      
      # Mistral Embeddings
      EMBEDDING_PROVIDER: mistral
      EMBEDDING_MODEL: mistral-embed
      MISTRAL_EMBEDDING_API_KEY: ${MISTRAL_EMBEDDING_API_KEY:-${MISTRAL_API_KEY}}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-50}
      
      # File storage
      FILE_CONNECTOR_TMP_STORAGE_PATH: /home/file_connector_attachments
      STALE_FILE_CLEANUP_DAYS: "7"
      
      # Craft
      ENABLE_CRAFT: "true"
      CRAFT_SERVICE_URL: http://craft-service:8081
      DOCKER_HOST: unix:///var/run/docker.sock
      
      # Telemetry & logging
      ENABLE_TELEMETRY: "false"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      METRICS_DRIVER: none
      
    volumes:
      - local_dynamic_storage:/home/storage
      - file_connector_tmp_storage:/home/file_connector_attachments
      - craft_sandbox_artifacts:/tmp/craft_artifacts
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      relational_db:
        condition: service_healthy
      cache:
        condition: service_healthy
      vector:
        condition: service_healthy
      craft-service:
        condition: service_started
    networks:
      onyx-network:
        ipv4_address: 172.28.0.30
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  # ==========================================
  # CRAFT SERVICE (AI Sandbox)
  # No ports exposed to internet - internal only
  # ==========================================
  craft-service:
    image: ghcr.io/onyx-dot-app/onyx-craft:latest
    container_name: onyx-craft
    restart: unless-stopped
    expose:
      - "8081"
    environment:
      PORT: "8081"
      SANDBOX_TIMEOUT: ${CRAFT_TIMEOUT:-120}
      MAX_MEMORY_MB: ${CRAFT_MAX_MEMORY:-512}
      MAX_OUTPUT_LENGTH: "10000"
      WHITELISTED_MODULES: >-
        numpy,pandas,matplotlib,requests,
        beautifulsoup4,scipy,scikit-learn,
        json,re,collections,itertools,math,random,statistics
      DISABLE_NETWORKING: ${CRAFT_DISABLE_NETWORK:-false}
      ALLOWED_HOSTS: ${DOMAIN:-localhost},api.mistral.ai,*.mistral.ai
      LOG_LEVEL: INFO
    volumes:
      - craft_sandbox_artifacts:/tmp/craft_artifacts:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      onyx-network:
        ipv4_address: 172.28.0.40
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ==========================================
  # RELATIONAL DATABASE (PostgreSQL 15.2)
  # No ports exposed - internal only
  # ==========================================
  relational_db:
    image: postgres:15.2
    container_name: onyx-postgres
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - local_dynamic_storage:/var/lib/postgresql/data
    networks:
      onyx-network:
        ipv4_address: 172.28.0.50
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==========================================
  # VECTOR DATABASE (pgvector)
  # Stores Mistral embeddings (1024d)
  # No ports exposed - internal only
  # ==========================================
  vector:
    image: ankane/pgvector:latest
    container_name: onyx-vector
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - local_dynamic_storage:/var/lib/postgresql/data
    networks:
      onyx-network:
        ipv4_address: 172.28.0.60
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==========================================
  # CACHE (Redis 7)
  # No ports exposed - internal only
  # ==========================================
  cache:
    image: redis:7-alpine
    container_name: onyx-redis
    restart: unless-stopped
    expose:
      - "6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - local_dynamic_storage:/data
    networks:
      onyx-network:
        ipv4_address: 172.28.0.70
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
