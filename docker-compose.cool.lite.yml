# ============================================================================
# ONYX LITE - COOLIFY DEPLOYMENT
# ============================================================================
# Minimal Onyx deployment optimized for Coolify (Docker Compose buildpack)
# - No vector database (DISABLE_VECTOR_DB=true)
# - No Redis (uses PostgreSQL for cache)
# - No model servers (bring your own LLM API)
# - No background workers (API handles all work)
# - No OpenSearch (no RAG indexing)
# - No MinIO (uses PostgreSQL for file storage)
# - No nginx (Coolify's Traefik proxy handles routing directly)
#
# Core features that STILL WORK:
# - LLM chat conversations
# - Tool integrations
# - User file uploads
# - Projects
# - Agent knowledge
# - Code interpreter
#
# CORRECTIONS APPLIED (vs. original):
#  - Removed the `nginx` service: it was on a private bridge with no published
#    port and unreachable by Coolify's proxy. Routing is now done by Coolify.
#  - Added ENABLE_OPENSEARCH_INDEXING_FOR_ONYX=false (CRITICAL for lite mode;
#    it defaults to true in v3.0 and would crash the API without OpenSearch).
#  - AUTH_TYPE is now pinned to "basic" (was unset -> startup failure).
#  - Added explicit POSTGRES_DB / POSTGRES_PORT to api_server.
#  - Added `expose` ports so Coolify can reach the containers on its network.
#  - Removed top-level `name: onyx` to avoid project-name clashes in Coolify.
#
# COOLIFY ROUTING (set in Coolify UI -> Domain -> Rules):
#   /*       -> web_server  :3000   (Next.js UI)
#   /api/*   -> api_server  :8080   (FastAPI backend; UI calls /api same-origin)
#
# Deploy in Coolify:
# 1. Create new Application from Git repository
# 2. Set Build Pack to "Docker Compose"
# 3. Point to this docker-compose.yml
# 4. Add environment variables from Coolify UI (see REQUIRED VARS below)
# 5. Configure domain + path routes in Coolify UI (Coolify handles SSL)
# 6. Configure storage volumes in Coolify UI (db_data is critical/persistent)
#
# REQUIRED ENV VARS (set in Coolify UI, not here):
#   POSTGRES_PASSWORD      - strong password for Postgres
#   USER_AUTH_SECRET       - random 32+ char secret for auth tokens
#   WEB_DOMAIN             - your domain, e.g. onyx.example.com (must match Coolify domain)
#   ENCRYPTION_KEY_SECRET  - random secret (recommended)
#   IMAGE_TAG              - pin to a specific Onyx release (NOT "latest") for reproducibility
# ============================================================================

services:
  api_server:
    image: onyxdotapp/onyx-backend:${IMAGE_TAG:-latest}
    command: >
      /bin/sh -c "alembic upgrade head &&
      echo 'Starting Onyx Api Server' &&
      uvicorn onyx.main:app --host 0.0.0.0 --port 8080"
    restart: unless-stopped
    depends_on:
      relational_db:
        condition: service_healthy
    expose:
      - "8080"
    environment:
      - AUTH_TYPE=basic
      - USER_AUTH_SECRET=${USER_AUTH_SECRET}
      - WEB_DOMAIN=${WEB_DOMAIN}
      - INTERNAL_URL=http://api_server:8080
      - DISABLE_VECTOR_DB=true
      - ENABLE_OPENSEARCH_INDEXING_FOR_ONYX=false
      - FILE_STORE_BACKEND=postgres
      - CACHE_BACKEND=postgres
      - AUTH_BACKEND=postgres
      - DISABLE_MODEL_SERVER=true
      - POSTGRES_HOST=relational_db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=onyx
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ENCRYPTION_KEY_SECRET=${ENCRYPTION_KEY_SECRET}
      - DISABLE_TELEMETRY=${DISABLE_TELEMETRY:-true}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 600s
    volumes:
      - api_server_logs:/var/log/onyx
      - file-system:/app/file-system
    networks:
      - onyx-network

  web_server:
    image: onyxdotapp/onyx-web-server:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - api_server
    expose:
      - "3000"
    environment:
      - INTERNAL_URL=http://api_server:8080
      - WEB_DOMAIN=${WEB_DOMAIN}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - onyx-network

  relational_db:
    image: postgres:15.2-alpine
    shm_size: 1g
    command: -c 'max_connections=250'
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=onyx
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - onyx-network

networks:
  onyx-network:
    driver: bridge

volumes:
  db_data:
    driver: local
  api_server_logs:
    driver: local
  file-system:
    driver: local
